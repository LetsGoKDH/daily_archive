name: Daily Paper Build

on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 KST (21:00 UTC previous day)
  workflow_dispatch:       # Manual trigger for testing

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers and generate summaries
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          ARXIV_CATEGORIES: ${{ vars.ARXIV_CATEGORIES }}
        run: python scripts/run_daily.py

      - name: Commit and push generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git diff --staged --quiet || git commit -m "Update papers for $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
